name: veggiemama
description: A gentle and empathetic Flutter app for pregnant women and new moms on a plant-based journey.
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  go_router: ^13.1.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  dio: ^5.4.2+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  lottie: ^2.7.0
  flutter_chat_ui: ^1.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/ 